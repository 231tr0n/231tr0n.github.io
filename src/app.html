<!doctype html>
<html lang="en">
	<head>
		<style>
			* {
				scrollbar-width: none !important;
			}
			*::-webkit-scrollbar {
				display: none !important;
			}
		</style>
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/images/pwa-192x192.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta charset="utf-8" />
		<meta name="author" content="231tr0n" />
		<meta name="description" content="Personal blog and portfolio of Srikar (231tr0n)." />
		<meta name="keywords" content="Blog, Personal Website" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="231tr0n" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:title" content="231tr0n" />
		<meta property="og:description" content="Personal blog and portfolio of Srikar (231tr0n)." />
		<meta property="og:image" content="https://231tr0n.github.io/images/logo.avif" />
		<meta property="og:image:type" content="image/avif" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:url" content="https://231tr0n.github.io" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="231tr0n" />
		<meta name="twitter:description" content="Personal blog and portfolio of Srikar (231tr0n)." />
		<meta name="twitter:image" content="https://231tr0n.github.io/images/logo.avif" />
		<title>231tr0n</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			(function () {
				const theme =
					localStorage.getItem('theme') ??
					(matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
				localStorage.setItem('theme', theme);
				if (theme === 'dark') document.body.classList.add('dark');
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
