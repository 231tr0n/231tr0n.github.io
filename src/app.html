<!doctype html>
<html lang="en">
	<head>
		<style>
			* {
				scrollbar-width: none !important;
			}
			*::-webkit-scrollbar {
				display: none !important;
			}
		</style>
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/images/pwa-192x192.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta charset="utf-8" />
		<meta name="author" content="231tr0n" />
		<meta
			name="description"
			content="Personal website of Srikar (231tr0n) — Linux enthusiast, Gopher, programmer, badminton player and gamer. Has blog, portfolio, projects, utilities and games." />
		<meta name="keywords" content="Blog, Personal Website" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="231tr0n" />
		<meta property="og:locale" content="en_US" />
		<meta
			property="og:description"
			content="Personal website of Srikar (231tr0n) — Linux enthusiast, Gopher, programmer, badminton player and gamer." />
		<meta name="twitter:card" content="summary_large_image" />
		<meta
			name="twitter:description"
			content="Personal website of Srikar (231tr0n) — Linux enthusiast, Gopher, programmer, badminton player and gamer. Has blog, portfolio, projects, utilities and games." />
		<title>231tr0n — Linux Enthusiast, Programmer and Gopher</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			(function () {
				const theme =
					localStorage.getItem('theme') ??
					(matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
				localStorage.setItem('theme', theme);
				if (theme === 'dark') document.body.classList.add('dark');
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
